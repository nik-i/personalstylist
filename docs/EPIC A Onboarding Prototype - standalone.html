document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

— two options -->\n    <div style=\"font-size:11px;text-transform:uppercase;letter-spacing:0.14em;font-weight:600;color:var(--ink-3);\">Footwear — your call<\u002Fdiv>\n    <div style=\"display:flex;gap:10px;\">\n      <sc-for list=\"{{ shoeOptions }}\" as=\"sh\" hint-placeholder-count=\"2\">\n        <button sc-camel-on-click=\"{{ sh.onTap }}\" style=\"flex:1;border-radius:14px;cursor:pointer;font-family:inherit;text-align:left;padding:0;overflow:hidden;background:var(--white);border:2px solid {{ sh.bd }};\" style-active=\"transform:scale(0.98)\">\n          <div style=\"height:78px;background:{{ sh.tone }};position:relative;display:flex;align-items:flex-end;padding:8px;box-sizing:border-box;\">\n            <sc-if value=\"{{ sh.selected }}\" hint-placeholder-val=\"{{ false }}\">\n              <span style=\"position:absolute;top:7px;right:7px;width:19px;height:19px;border-radius:50%;background:var(--rouge);color:#FFF8F0;display:flex;align-items:center;justify-content:center;\"><svg width=\"11\" height=\"11\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"m5 13 4 4L19 7\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n            <\u002Fsc-if>\n            <span style=\"font-family:'Instrument Serif',serif;font-style:italic;font-size:11px;color:rgba(255,248,240,0.92);text-shadow:0 1px 2px rgba(32,27,21,0.35);\">{{ sh.name }}<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"padding:8px 10px 10px;\">\n            <div style=\"font-size:9.5px;text-transform:uppercase;letter-spacing:0.1em;font-weight:600;color:{{ sh.tagColor }};\">{{ sh.tag }}<\u002Fdiv>\n            <div style=\"font-size:12.5px;font-weight:600;color:var(--ink);margin-top:2px;\">{{ sh.name }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"padding:0 20px 16px;display:flex;gap:10px;align-items:center;\">\n    <button sc-camel-on-click=\"{{ startListen }}\" aria-label=\"Talk to Maya\" style=\"width:50px;height:50px;border-radius:50%;border:none;background:var(--ink);color:var(--cream);display:flex;align-items:center;justify-content:center;cursor:pointer;flex:none;\" style-hover=\"background:#3a332b\" style-active=\"transform:scale(0.95)\"><svg width=\"20\" height=\"20\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.75\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z\"><\u002Fpath><path d=\"M19 10v2a7 7 0 0 1-14 0v-2\"><\u002Fpath><path d=\"M12 19v3\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n    <button sc-camel-on-click=\"{{ loveIt }}\" style=\"flex:1;height:50px;border-radius:999px;border:none;background:var(--rouge);color:#FFF8F0;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;\" style-hover=\"background:var(--rouge-deep)\" style-active=\"transform:scale(0.97)\">Love it — wear it<\u002Fbutton>\n  <\u002Fdiv>\n\n  <!-- refine chat sheet removed — conversation now lives inline in the look -->\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- toast -->\n<sc-if value=\"{{ toast }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"position:absolute;bottom:84px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--cream);border-radius:999px;padding:11px 18px;font-size:13px;font-weight:500;display:inline-flex;align-items:center;gap:9px;white-space:nowrap;animation:frkUp 220ms var(--ease-out) both;box-shadow:var(--shadow-raised);\">\n    <span style=\"width:7px;height:7px;border-radius:50%;background:#4F7B58;\"><\u002Fspan>{{ toast }}\n  <\u002Fdiv>\n<\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;$preview&quot;: {&quot;width&quot;: 438, &quot;height&quot;: 856},\n  &quot;stylistName&quot;: {&quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;Margaux&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Stylist&quot;},\n  &quot;startScreen&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;intro&quot;, &quot;capture&quot;, &quot;importSelect&quot;, &quot;importReview&quot;, &quot;photoFront&quot;, &quot;describeInput&quot;, &quot;hub&quot;, &quot;brief&quot;, &quot;taste&quot;, &quot;fit&quot;, &quot;shops&quot;, &quot;done&quot;], &quot;default&quot;: &quot;intro&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Flow&quot;},\n  &quot;itemsFound&quot;: {&quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 24, &quot;min&quot;: 8, &quot;max&quot;: 200, &quot;tsType&quot;: &quot;number&quot;, &quot;section&quot;: &quot;Flow&quot;}\n}\">\nclass Component extends DCLogic {\n  state = {\n    screen: 'intro',\n    captionIndex: 0, speaking: true, listening: false, heard: false,\n    reviewTab: 'needs',\n    fixes: {},\n    importSel: {},\n    describeText: '', describePick: null,\n    photoBackTaken: false,\n    added: 0, addedBy: { import: 0, photo: 0, describe: 0 },\n    shoePick: 'walk', savedToCal: false,\n    lookMode: 'signature', bottomIdx: 0,\n    chatOpen: false, chatMsgs: [], chatDraft: '',\n    recCaptionIndex: 0, recSpeaking: true,\n    recListening: false, lastReply: null, replyCount: 0, refineTurn: 0,\n    hubDone: { taste: false, fit: false, shops: false },\n    brief: {}, briefStep: 0, styling: false,\n    country: 'United Kingdom', countryOpen: false,\n    taste: {},\n    sizes: { tops: '', bottoms: '', dresses: '', shoes: '' },\n    shape: null,\n    emph: {},\n    budget: null,\n    shopOpen: 'day',\n    brands: { day: ['Zara', 'COS'], office: [], occasion: [], athletic: ['Lululemon'] },\n    toast: null,\n  };\n\n  componentDidMount() {\n    const start = this.props.startScreen ?? 'intro';\n    if (start !== 'intro') { this.setState({ screen: start, captionIndex: 2, speaking: false }); if (start === 'done') this.startRec(); return; }\n    this._capT = setInterval(() => {\n      this.setState((st) => {\n        if (st.listening) return null;\n        if (st.captionIndex >= 2) { clearInterval(this._capT); return { speaking: false }; }\n        return { captionIndex: st.captionIndex + 1 };\n      });\n    }, 2700);\n  }\n  componentWillUnmount() { clearInterval(this._capT); clearInterval(this._recT); clearTimeout(this._scanT); clearTimeout(this._toastT); clearTimeout(this._hearT); clearTimeout(this._goT); clearTimeout(this._styleT); clearTimeout(this._sayT); clearTimeout(this._listenT); }\n\n  go(screen) { this.setState({ screen, countryOpen: false }); }\n  pushChat(user, maya, patch) {\n    this.setState((st) => ({ chatMsgs: [...st.chatMsgs, { me: true, text: user }, { me: false, text: maya }], ...(patch || {}) }));\n    setTimeout(() => { if (this._chatEnd) this._chatEnd.scrollTop = this._chatEnd.scrollHeight; }, 40);\n  }\n  openChat() {\n    this.setState((st) => ({ chatOpen: true, chatMsgs: st.chatMsgs.length ? st.chatMsgs : [{ me: false, text: \"Tell me what to tweak — say it or tap below. The top, the bottom, the shoes, or the whole vibe. I'll keep what's working.\" }] }));\n  }\n  startRec() {\n    clearInterval(this._recT);\n    this.setState({ recCaptionIndex: 0, recSpeaking: true });\n    this._recT = setInterval(() => {\n      this.setState((st) => {\n        if (st.recCaptionIndex >= 3) { clearInterval(this._recT); return { recSpeaking: false }; }\n        return { recCaptionIndex: st.recCaptionIndex + 1 };\n      });\n    }, 2600);\n  }\n  componentDidUpdate(pp, ps) {\n    if (ps && ps.screen !== 'done' && this.state.screen === 'done') this.startRec();\n  }\n  mayaSay(reply, patch) {\n    clearInterval(this._recT); clearTimeout(this._sayT);\n    this.setState((st) => ({ lastReply: reply, recSpeaking: true, recListening: false, replyCount: st.replyCount + 1, ...(patch || {}) }));\n    this._sayT = setTimeout(() => this.setState({ recSpeaking: false }), 2200);\n  }\n  startListen() {\n    clearInterval(this._recT); clearTimeout(this._listenT); clearTimeout(this._sayT);\n    this.setState({ recListening: true, recSpeaking: true, lastReply: null });\n    this._listenT = setTimeout(() => {\n      const seq = this._refineSeq || [];\n      const turn = (this.state.refineTurn || 0) % (seq.length || 1);\n      const act = seq[turn] || { reply: \"Tell me what you'd change.\", patch: {} };\n      this.mayaSay(act.reply, { ...act.patch, refineTurn: turn + 1 });\n    }, 1500);\n  }\n  pop(msg) {\n    this.setState({ toast: msg });\n    clearTimeout(this._toastT);\n    this._toastT = setTimeout(() => this.setState({ toast: null }), 2200);\n  }\n\n  renderVals() {\n    const s = this.state;\n    const name = this.props.stylistName ?? 'Margaux';\n    const total = s.added > 0 ? s.added : (this.props.itemsFound ?? 24);\n    const flaggedData = [\n      { id: 'f1', tone: '#8A4A52', name: 'Rose midi', q: 'Skirt or dress?', optA: 'Midi skirt', optB: 'Dress' },\n      { id: 'f2', tone: '#E4D6BE', name: 'Knit', q: 'Cream or white?', optA: 'Cream', optB: 'White' },\n      { id: 'f3', tone: '#9AA08A', name: 'Throw?', q: 'Not clothing?', optA: 'Keep it', optB: 'Remove' },\n      { id: 'f4', tone: '#3A4256', name: 'Denim', q: 'Duplicate of your denim?', optA: 'Keep both', optB: 'Merge' },\n    ];\n    const fixedCount = Object.keys(s.fixes).length;\n    const remaining = flaggedData.length - fixedCount;\n    const confidentN = total - flaggedData.length;\n    const chipOn = { bg: 'var(--ink)', fg: 'var(--cream)', bd: 'var(--ink)' };\n    const chipOff = { bg: 'transparent', fg: 'var(--ink)', bd: 'var(--border-strong)' };\n\n    const pathDefs = [\n      { id: 'import', title: 'Import from camera roll', sub: \"I'll scan and tag — with your OK on everything.\", icon1: 'M13 2 3 14h9l-1 8 10-12h-9l1-8z', icon2: '' },\n      { id: 'photo', title: 'Photograph items', sub: 'One by one, auto-tagged as you go.', icon1: 'M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z', icon2: 'M15 13a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z' },\n      { id: 'describe', title: 'Just describe it', sub: '\"A navy wool blazer, black straight jeans…\" — I\\u2019ll find visual twins you confirm.', icon1: 'M7.9 20A9 9 0 1 0 4 16.1L2 22Z', icon2: '' },\n    ];\n    const launch = {\n      import: () => this.go('importSelect'),\n      photo: () => { this.setState({ photoBackTaken: false }); this.go('photoFront'); },\n      describe: () => { this.setState({ describeText: '', describePick: null }); this.go('describeInput'); },\n    };\n    const methods = pathDefs.map((p) => {\n      const cnt = s.addedBy[p.id] || 0;\n      return {\n        ...p, count: cnt, hasCount: cnt > 0, countLabel: cnt > 0 ? `${cnt} added` : '',\n        onTap: launch[p.id],\n      };\n    });\n    const importTileDefs = [\n      { id: 1, tone: '#C8A47E' }, { id: 2, tone: '#8A4A52' }, { id: 3, tone: '#3A4256' }, { id: 4, tone: '#E4D6BE' },\n      { id: 5, tone: '#8A8B6C' }, { id: 6, tone: '#2A2622' }, { id: 7, tone: '#A65B38' }, { id: 8, tone: '#4C4844' },\n      { id: 9, tone: '#B98A6A' }, { id: 10, tone: '#6C6A74' }, { id: 11, tone: '#7A5A48' }, { id: 12, tone: '#9AA08A' },\n    ];\n    const importSelN = Object.values(s.importSel).filter(Boolean).length;\n    const importTiles = importTileDefs.map((t) => ({\n      ...t, sel: !!s.importSel[t.id], bd: s.importSel[t.id] ? 'var(--rouge)' : 'transparent',\n      onTap: () => this.setState((st) => {\n        const cur = !!st.importSel[t.id];\n        if (!cur && Object.values(st.importSel).filter(Boolean).length >= 20) return null;\n        return { importSel: { ...st.importSel, [t.id]: !cur } };\n      }),\n    }));\n    const extractedN = importSelN || 8;\n    const fixedCountI = Object.keys(s.fixes).length;\n    const needsRemain = Math.max(flaggedData.length - fixedCountI, 0);\n    const confN = Math.max(extractedN - flaggedData.length, 0);\n\n    const flagged = flaggedData.map((f) => {\n      const fixed = s.fixes[f.id   'Australia': { city: 'Sydney', temp: '24°', cond: 'warm and sunny', layer: 'no jacket needed', note: 'UV high midday' },\n        };\n        const w = WEATHER[s.country] || WEATHER['United Kingdom'];\n        const dayWord = { 'Right now': 'today', 'Tonight': 'tonight', 'Tomorrow': 'tomorrow', 'This weekend': 'Saturday' }[s.brief.time] || 'today';\n        const dayCap = dayWord.charAt(0).toUpperCase() + dayWord.slice(1);\n        const noJacket = /no jacket/i.test(w.layer);\n        const comfy = s.lookMode === 'comfy';\n        const mode = LOOK_MODE[s.lookMode] || LOOK_MODE.signature;\n        const shoeDefs = [\n          { id: 'walk', tag: \"If you'll walk\", name: 'Black ballet flats', tone: '#2A2622' },\n          { id: 'easy', tag: 'If you barely walk', name: 'Suede block heels', tone: '#6B4A55' },\n        ];\n        const comfyShoe = { id: 'comfy', name: 'White sneakers', tone: '#B8B2A6' };\n        const shoeOptions = shoeDefs.map((sh) => ({\n          ...sh, selected: !comfy && s.shoePick === sh.id,\n          bd: (!comfy && s.shoePick === sh.id) ? 'var(--rouge)' : 'var(--border-soft)',\n          tagColor: (!comfy && s.shoePick === sh.id) ? 'var(--rouge)' : 'var(--ink-3)',\n          onTap: () => this.setState({ shoePick: sh.id, lookMode: comfy ? 'signature' : s.lookMode }),\n        }));\n        const shoeTile = comfy ? comfyShoe : shoeDefs.find((sh) => sh.id === s.shoePick);\n        const bottom = BOTTOMS[s.bottomIdx];\n        const lookTiles = [\n          { tone: mode.top.tone, label: mode.top.name },\n          { tone: bottom.tone, label: bottom.name },\n          { tone: mode.layer.tone, label: mode.layer.name },\n        ];\n        // refine chips\n        const refineChips = [\n          { label: 'Swap the bottom', onTap: () => { const ni = (s.bottomIdx + 1) % BOTTOMS.length; this.mayaSay(`Swapped in the ${BOTTOMS[ni].name.toLowerCase()} — top and shoes stay put. Different mood, same effort.`, { bottomIdx: ni }); } },\n          { label: 'Something comfier', onTap: () => this.mayaSay('Softened it up — oversized cardigan, cotton tee, wide-leg trousers and white sneakers. Still looks considered.', { lookMode: 'comfy', bottomIdx: 3 }) },\n          { label: 'Change the shoes', onTap: () => { const np = s.shoePick === 'walk' ? 'easy' : 'walk'; this.mayaSay(np === 'walk' ? \"Back to the flats — good if you'll be on your feet.\" : \"Block heels it is — since you're barely walking.\", { shoePick: np, lookMode: comfy ? 'signature' : s.lookMode }); } },\n          { label: 'Warmer layer', onTap: () => this.mayaSay(`With this ${w.temp} in ${w.city}, I'd add the ${w.layer} — you'll be glad of it.`, {}) },\n          { label: 'Another option', onTap: () => { const nm = s.lookMode === 'evening' ? 'signature' : 'evening'; this.mayaSay(nm === 'evening' ? \"Here's an after-dark take — wine blazer over a silk cami. Keeps your bottom and shoes.\" : 'Back to the camel — clean, warm, daytime.', { lookMode: nm }); } },\n        ];\n        const routeText = (raw) => {\n          const t = raw.toLowerCase();\n          if (/comf|cosy|cozy|relax|easy/.test(t)) return { maya: 'On it — softer layers, wide-leg trousers, sneakers. Comfier but still pulled together.', patch: { lookMode: 'comfy', bottomIdx: 3 } };\n          if (/bottom|trouser|jean|denim|skirt|pant/.test(t)) { const ni = (s.bottomIdx + 1) % BOTTOMS.length; return { maya: `Swapped the bottom for the ${BOTTOMS[ni].name.toLowerCase()}. Top and shoes stay.`, patch: { bottomIdx: ni } }; }\n          if (/shoe|heel|flat|sneaker|boot/.test(t)) { const np = s.shoePick === 'walk' ? 'easy' : 'walk'; return { maya: np === 'easy' ? 'Switched to the block heels.' : 'Switched to the flats.', patch: { shoePick: np, lookMode: comfy ? 'signature' : s.lookMode } }; }\n          if (/dress|evening|night|fancy|smart/.test(t)) return { maya: \"Dressed it up — wine blazer over a silk cami, after-dark energy.\", patch: { lookMode: 'evening' } };\n          return { maya: \"Tell me which part — the top, the bottom, the shoes — or say 'comfier' or 'dress it up' and I'll adjust.\", patch: {} };\n        };\n        const recCaptions = [\n          `It's ${w.temp} and ${w.cond} in ${w.city} ${dayWord}.`,\n          noJacket\n            ? `So I kept it light — no jacket, just sunglasses.`\n            : `So I layered the ${w.layer} over the ${mode.top.name.toLowerCase()} — you'll want it.`,\n          comfy\n            ? `Soft and easy, and it's all yours already — nothing to buy.`\n            : `Flats if you're walking, heels if not — and it's all yours already.`,\n          `Like it? Or tell me what you'd change — just say the word.`,\n        ];\n        // requests she fulfils each time you talk to her (voice)\n        this._refineSeq = [\n          { reply: `Swapped in the ${BOTTOMS[(s.bottomIdx + 1) % BOTTOMS.length].name.toLowerCase()} — top and shoes stay put.`, patch: { bottomIdx: (s.bottomIdx + 1) % BOTTOMS.length } },\n          { reply: 'Softened it up — cardigan, cotton tee, wide-leg trousers and sneakers. Still considered.', patch: { lookMode: 'comfy', bottomIdx: 3 } },\n          { reply: s.shoePick === 'walk' ? 'Block heels it is — since you asked.' : \"Back to the flats — easier on your feet.\", patch: { shoePick: s.shoePick === 'walk' ? 'easy' : 'walk', lookMode: comfy ? 'signature' : s.lookMode } },\n          { reply: s.lookMode === 'evening' ? 'Back to the camel — clean, warm, daytime.' : \"Here's an after-dark take — wine blazer over a silk cami.\", patch: { lookMode: s.lookMode === 'evening' ? 'signature' : 'evening' } },\n        ];\n        const ri = Math.min(s.recCaptionIndex, recCaptions.length - 1);\n        let recCaption, recCaptionKey;\n        if (s.recListening) { recCaption = 'Listening…'; recCaptionKey = 'listen'; }\n        else if (s.lastReply) { recCaption = s.lastReply; recCaptionKey = 'reply' + s.replyCount; }\n        else { recCaption = recCaptions[ri]; recCaptionKey = 'r' + ri; }\n        return {\n          lookOverline: s.brief.occasion ? `For your ${s.brief.occasion.toLowerCase()} · ${dayWord}` : 'Your first look',\n          lookHeadline: mode.headline,\n          recCaption, recCaptionKey,\n          recSpeaking: s.recSpeaking, recIdle: !s.recSpeaking,\n          startListen: () => this.startListen(),\n          loveIt: () => this.pop('Marked as worn — très chic'),\n          lookPieceLine: comfy ? mode.line : `4 pieces with the ${shoeTile.name.toLowerCase()} — ${mode.line}`,\n          lookTiles, shoeOptions,\n          // chat widget\n          chatOpen: s.chatOpen, chatClosed: !s.chatOpen,\n          openChat: () => this.openChat(),\n          closeChat: () => this.setState({ chatOpen: false }),\n          chatMsgs: s.chatMsgs.map((m) => ({\n            text: m.text,\n            align: m.me ? 'flex-end' : 'flex-start',\n            bg: m.me ? 'var(--ink)' : 'var(--white)',\n            fg: m.me ? 'var(--cream)' : 'var(--text-body)',\n            border: m.me ? 'none' : '1px solid var(--border-soft)',\n            brr: m.me ? '6px' : '18px',\n            blr: m.me ? '18px' : '6px',\n          })),\n          refineChips,\n          chatDraft: s.chatDraft,\n          onChatDraft: (e) => { const v = e.target.value; this.setState({ chatDraft: v }); },\n          chatEndRef: (el) => { this._chatEnd = el; },\n          sendChat: () => { const t = s.chatDraft.trim(); if (!t) return; const r = routeText(t); this.setState({ chatDraft: '' }); this.pushChat(t, r.maya, r.patch); },\n          onChatKey: (e) => { if (e.key !== 'Enter') return; e.preventDefault(); const t = s.chatDraft.trim(); if (!t) return; const r = routeText(t); this.setState({ chatDraft: '' }); this.pushChat(t, r.maya, r.patch); },\n          saveToCal: () => { this.setState({ savedToCal: true }); this.pop(`Saved to ${dayCap}`); },\n          savedToCal: s.savedToCal, notSavedToCal: !s.savedToCal,\n          calBg: s.savedToCal ? 'var(--success-tint)' : 'var(--white)',\n          calBd: s.savedToCal ? 'var(--success-tint)' : 'var(--border-strong)',\n          calIconBg: s.savedToCal ? 'var(--success)' : 'var(--surface-well)',\n          calIconFg: s.savedToCal ? '#FFF8F0' : 'var(--ink-2)',\n          calTitle: s.savedToCal ? `Saved to ${dayCap}` : `Save this look to ${dayCap}`,\n          calSub: s.savedToCal ? 'Find it under that day, anytime.' : 'So you can pull it back up on the day.',\n          doneAssist: noJacket\n            ? '\"Told you your closet was plenty. I\\u2019ll adjust if the weather turns.\"'\n            : `\"I\\u2019ll swap the layer if ${w.city} surprises us — check back on the day.\"`,\n        };\n      })(),\n      wearIt: () => this.pop('Marked as worn — très chic'),\n    };\n  }\n}\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
